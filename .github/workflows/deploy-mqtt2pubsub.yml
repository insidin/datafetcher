name: deploy-mqtt2pubsub

on:
  push:
    branches: ["main"]
    paths:
      - "mqtt2pubsub/**"
      - ".github/workflows/deploy-mqtt2pubsub.yml"
  workflow_dispatch:
  workflow_call: # allows release-mqtt2pubsub.yml to chain into this

permissions:
  contents: read
  id-token: write

env:
  APP_DIR: mqtt2pubsub
  TF_DIR: mqtt2pubsub/terraform
  REGION: europe-west1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  AR_REPO: ${{ secrets.GCP_ARTIFACT_REGISTRY_REPO }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Unit tests (no GCP / MQTT required) ───────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        working-directory: ${{ env.APP_DIR }}
        run: |
          pip install -q pytest paho-mqtt google-cloud-pubsub
          pytest tests/ -v

      # ── GCP authentication ─────────────────────────────────────────────────

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── Container image ────────────────────────────────────────────────────

      - name: Build and push container image
        run: |
          IMAGE="${AR_REPO}/mqtt2pubsub:${GITHUB_SHA}"
          gcloud auth configure-docker "${AR_REPO%%/*}" --quiet
          docker build --platform linux/amd64 -t "${IMAGE}" "${APP_DIR}"
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Verify image architecture
        run: |
          ARCH=$(docker inspect --format '{{.Os}}/{{.Architecture}}' "${IMAGE}")
          echo "Image architecture: ${ARCH}"
          if [[ "${ARCH}" != "linux/amd64" ]]; then
            echo "ERROR: expected linux/amd64, got ${ARCH}" >&2
            exit 1
          fi

      - name: Smoke-test container imports
        run: |
          docker run --rm --platform linux/amd64 "${IMAGE}" \
            python -c "import main; print('imports OK')"

      - name: Smoke-test container health endpoint (MQTT_TOPIC mode)
        # Verifies the health server stays up even when MQTT is unreachable.
        run: |
          docker run -d --name mqtt2pubsub-smoke-topic \
            --platform linux/amd64 \
            -p 8099:8080 \
            -e FORWARD_MODE=stdout \
            -e MQTT_HOST=localhost \
            -e MQTT_PORT=1883 \
            -e MQTT_TLS_ENABLED=false \
            -e MQTT_TOPIC=test/# \
            "${IMAGE}"
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8099/)
          docker logs mqtt2pubsub-smoke-topic
          docker rm -f mqtt2pubsub-smoke-topic
          echo "MQTT_TOPIC mode: HTTP ${HTTP_STATUS}"
          [[ "${HTTP_STATUS}" == "200" ]] || { echo "ERROR: expected 200" >&2; exit 1; }

      - name: Smoke-test container health endpoint (DEVICE_IDENTIFIERS mode)
        # Mirrors the production config: DEVICE_IDENTIFIERS set, MQTT_TOPIC
        # unset, MQTT_TOPIC_TEMPLATE unset (empty). This is the exact config
        # that caused every previous startup failure.
        run: |
          docker run -d --name mqtt2pubsub-smoke-devices \
            --platform linux/amd64 \
            -p 8098:8080 \
            -e FORWARD_MODE=stdout \
            -e MQTT_HOST=localhost \
            -e MQTT_PORT=1883 \
            -e MQTT_TLS_ENABLED=false \
            -e DEVICE_IDENTIFIERS=device1,device2 \
            "${IMAGE}"
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8098/)
          docker logs mqtt2pubsub-smoke-devices
          docker rm -f mqtt2pubsub-smoke-devices
          echo "DEVICE_IDENTIFIERS mode: HTTP ${HTTP_STATUS}"
          [[ "${HTTP_STATUS}" == "200" ]] || { echo "ERROR: expected 200" >&2; exit 1; }

      # ── Terraform ──────────────────────────────────────────────────────────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${PROJECT_ID}-tfstate" \
            -backend-config="prefix=mqtt2pubsub"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        # Required vars are passed directly as TF_VAR_* env vars — never
        # interpolated into shell strings — to prevent command injection.
        #
        # Optional vars (those with defaults in variables.tf) are staged via
        # _OPT_* env vars and exported as TF_VAR_* only when non-empty.
        # This prevents an unset GitHub secret (which GitHub evaluates as "")
        # from overriding the Terraform variable default with an empty string.
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_container_image: ${{ env.IMAGE }}
          TF_VAR_service_account_email: "mqtt2pubsub-worker-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          TF_VAR_mqtt_host: ${{ secrets.MQTT_HOST }}
          # Optional — staged for conditional export below
          _OPT_MQTT_TOPIC: ${{ secrets.MQTT_TOPIC }}
          _OPT_MQTT_TOPIC_TEMPLATE: ${{ secrets.MQTT_TOPIC_TEMPLATE }}
          _OPT_EVENT_TYPE_TOPIC_MAP: ${{ secrets.EVENT_TYPE_TOPIC_MAP }}
          _OPT_EVENT_TYPE_JSON_FIELDS: ${{ secrets.EVENT_TYPE_JSON_FIELDS }}
          _OPT_EVENT_TYPE_FALLBACK: ${{ secrets.EVENT_TYPE_FALLBACK }}
          _OPT_DEVICE_IDENTIFIERS: ${{ secrets.DEVICE_IDENTIFIERS }}
        run: |
          # Export optional TF_VAR_* only when the secret is non-empty so that
          # an unset secret doesn't override the default in variables.tf.
          [[ -n "${_OPT_MQTT_TOPIC}" ]]            && export TF_VAR_mqtt_topic="${_OPT_MQTT_TOPIC}"
          [[ -n "${_OPT_MQTT_TOPIC_TEMPLATE}" ]]   && export TF_VAR_mqtt_topic_template="${_OPT_MQTT_TOPIC_TEMPLATE}"
          [[ -n "${_OPT_EVENT_TYPE_TOPIC_MAP}" ]]  && export TF_VAR_event_type_topic_map="${_OPT_EVENT_TYPE_TOPIC_MAP}"
          [[ -n "${_OPT_EVENT_TYPE_JSON_FIELDS}" ]] && export TF_VAR_event_type_json_fields="${_OPT_EVENT_TYPE_JSON_FIELDS}"
          [[ -n "${_OPT_EVENT_TYPE_FALLBACK}" ]]   && export TF_VAR_event_type_fallback="${_OPT_EVENT_TYPE_FALLBACK}"
          [[ -n "${_OPT_DEVICE_IDENTIFIERS}" ]]    && export TF_VAR_device_identifiers="${_OPT_DEVICE_IDENTIFIERS}"

          # mqtt_consumer_clients is numeric — validate before use
          CLIENTS="${{ secrets.MQTT_CONSUMER_CLIENTS }}"
          if [[ -n "${CLIENTS}" ]]; then
            if ! [[ "${CLIENTS}" =~ ^[0-9]+$ ]]; then
              echo "MQTT_CONSUMER_CLIENTS must be a positive integer, got: ${CLIENTS}" >&2
              exit 1
            fi
            export TF_VAR_mqtt_consumer_clients="${CLIENTS}"
          fi

          terraform apply -auto-approve
