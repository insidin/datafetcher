name: deploy-mqtt2pubsub

on:
  push:
    branches: ["main"]
    paths:
      - "mqtt2pubsub/**"
      - ".github/workflows/deploy-mqtt2pubsub.yml"
  workflow_dispatch:
  workflow_call: # allows release-mqtt2pubsub.yml to chain into this

permissions:
  contents: read
  id-token: write

env:
  APP_DIR: mqtt2pubsub
  TF_DIR: mqtt2pubsub/terraform
  REGION: europe-west1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  AR_REPO: ${{ secrets.GCP_ARTIFACT_REGISTRY_REPO }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Unit tests (no GCP / MQTT required) ───────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        working-directory: ${{ env.APP_DIR }}
        run: |
          pip install -q pytest paho-mqtt google-cloud-pubsub
          pytest tests/ -v

      # ── GCP authentication ─────────────────────────────────────────────────

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── Container image ────────────────────────────────────────────────────

      - name: Build and push container image
        run: |
          IMAGE="${AR_REPO}/mqtt2pubsub:${GITHUB_SHA}"
          gcloud auth configure-docker "${AR_REPO%%/*}" --quiet
          docker build --platform linux/amd64 -t "${IMAGE}" "${APP_DIR}"
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Verify image architecture
        run: |
          ARCH=$(docker inspect --format '{{.Os}}/{{.Architecture}}' "${IMAGE}")
          echo "Image architecture: ${ARCH}"
          if [[ "${ARCH}" != "linux/amd64" ]]; then
            echo "ERROR: expected linux/amd64, got ${ARCH}" >&2
            exit 1
          fi

      - name: Smoke-test container imports
        run: |
          docker run --rm --platform linux/amd64 "${IMAGE}" \
            python -c "import main; print('imports OK')"

      - name: Smoke-test container health endpoint
        # Starts the container with an unreachable MQTT host (no broker running
        # on localhost). With the resilient reconnect logic the container must
        # stay alive and keep the health server responding on $PORT even when
        # MQTT is unavailable. If the container crashes instead, this step fails
        # and we catch the bug before deploying to Cloud Run.
        run: |
          docker run -d --name mqtt2pubsub-smoke \
            --platform linux/amd64 \
            -p 8099:8080 \
            -e FORWARD_MODE=stdout \
            -e MQTT_HOST=localhost \
            -e MQTT_PORT=1883 \
            -e MQTT_TLS_ENABLED=false \
            -e MQTT_TOPIC=test/# \
            "${IMAGE}"

          # Give the health server time to bind the port
          sleep 5

          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8099/)
          echo "Health endpoint returned HTTP ${HTTP_STATUS}"
          docker logs mqtt2pubsub-smoke
          docker rm -f mqtt2pubsub-smoke

          if [[ "${HTTP_STATUS}" != "200" ]]; then
            echo "ERROR: expected HTTP 200, got ${HTTP_STATUS}" >&2
            exit 1
          fi

      # ── Terraform ──────────────────────────────────────────────────────────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${PROJECT_ID}-tfstate" \
            -backend-config="prefix=mqtt2pubsub"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        # Secrets are passed as TF_VAR_* environment variables — never interpolated
        # into shell strings — to prevent command injection via special characters.
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_container_image: ${{ env.IMAGE }}
          TF_VAR_service_account_email: "mqtt2pubsub-worker-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          TF_VAR_mqtt_host: ${{ secrets.MQTT_HOST }}
          TF_VAR_mqtt_topic: ${{ secrets.MQTT_TOPIC }}
          TF_VAR_event_type_topic_map: ${{ secrets.EVENT_TYPE_TOPIC_MAP }}
          TF_VAR_event_type_json_fields: ${{ secrets.EVENT_TYPE_JSON_FIELDS }}
          TF_VAR_event_type_fallback: ${{ secrets.EVENT_TYPE_FALLBACK }}
          TF_VAR_device_identifiers: ${{ secrets.DEVICE_IDENTIFIERS }}
          TF_VAR_mqtt_topic_template: ${{ secrets.MQTT_TOPIC_TEMPLATE }}
        run: |
          EXTRA_ARGS=()
          # mqtt_consumer_clients is numeric — validate before use
          CLIENTS="${{ secrets.MQTT_CONSUMER_CLIENTS }}"
          if [[ -n "${CLIENTS}" ]]; then
            if ! [[ "${CLIENTS}" =~ ^[0-9]+$ ]]; then
              echo "MQTT_CONSUMER_CLIENTS must be a positive integer, got: ${CLIENTS}" >&2
              exit 1
            fi
            EXTRA_ARGS+=(-var="mqtt_consumer_clients=${CLIENTS}")
          fi
          terraform apply -auto-approve "${EXTRA_ARGS[@]}"
