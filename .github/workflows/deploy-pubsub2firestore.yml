name: deploy-pubsub2firestore

on:
  push:
    branches: ["main"]
    paths:
      - "pubsub2firestore/**"
      - ".github/workflows/deploy-pubsub2firestore.yml"
  workflow_dispatch:
  workflow_call: # allows release-pubsub2firestore.yml to chain into this

permissions:
  contents: read
  id-token: write

env:
  APP_DIR: pubsub2firestore
  TF_DIR: pubsub2firestore/terraform
  REGION: europe-west1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  AR_REPO: ${{ secrets.PUBSUB2FIRESTORE_GCP_ARTIFACT_REGISTRY_REPO }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Unit tests (no GCP / network required) ────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint and run unit tests
        working-directory: ${{ env.APP_DIR }}
        run: |
          pip install -q ruff pytest google-cloud-pubsub google-cloud-firestore
          ruff check .
          ruff format --check .
          pytest tests/ -v

      # ── GCP authentication ──────────────────────────────────────────────────

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.PUBSUB2FIRESTORE_GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── Pre-flight checks ───────────────────────────────────────────────────

      - name: Pre-flight checks
        run: |
          FAILED=0

          echo "==> Checking worker SA exists..."
          WORKER_SA="pubsub2firestore-worker-sa@${PROJECT_ID}.iam.gserviceaccount.com"
          if gcloud iam service-accounts describe "${WORKER_SA}" --project="${PROJECT_ID}" &>/dev/null; then
            echo "  [OK] ${WORKER_SA}"
          else
            echo "  [FAIL] Worker SA '${WORKER_SA}' not found." >&2
            echo "         Apply platform terraform (data-platform-gcp) first." >&2
            FAILED=1
          fi

          echo "==> Checking Pub/Sub topic exists..."
          TOPIC="${{ secrets.PUBSUB2FIRESTORE_PUBSUB_TOPIC }}"
          TOPIC="${TOPIC:-mqtt-ingest}"
          if gcloud pubsub topics describe "${TOPIC}" --project="${PROJECT_ID}" &>/dev/null; then
            echo "  [OK] ${TOPIC}"
          else
            echo "  [FAIL] Pub/Sub topic '${TOPIC}' not found." >&2
            echo "         Deploy mqtt2pubsub first, or set PUBSUB2FIRESTORE_PUBSUB_TOPIC secret." >&2
            FAILED=1
          fi

          [[ ${FAILED} -eq 0 ]] || exit 1

      # ── Container image ─────────────────────────────────────────────────────

      - name: Build and push container image
        run: |
          IMAGE="${AR_REPO}/pubsub2firestore:${GITHUB_SHA}"
          gcloud auth configure-docker "${AR_REPO%%/*}" --quiet
          docker build --platform linux/amd64 -t "${IMAGE}" "${APP_DIR}"
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Verify image architecture
        run: |
          ARCH=$(docker inspect --format '{{.Os}}/{{.Architecture}}' "${IMAGE}")
          echo "Image architecture: ${ARCH}"
          if [[ "${ARCH}" != "linux/amd64" ]]; then
            echo "ERROR: expected linux/amd64, got ${ARCH}" >&2
            exit 1
          fi

      - name: Smoke-test container imports
        run: |
          docker run --rm --platform linux/amd64 \
            -e PUBSUB_SUBSCRIPTION="projects/smoke-test/subscriptions/smoke-test" \
            -e GCP_PROJECT_ID="smoke-test" \
            --entrypoint python "${IMAGE}" \
            -c "import main; print('imports OK')"

      # ── Terraform ───────────────────────────────────────────────────────────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${PROJECT_ID}-tfstate" \
            -backend-config="prefix=pubsub2firestore"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_container_image: ${{ env.IMAGE }}
          TF_VAR_service_account_email: "pubsub2firestore-worker-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          # Optional — staged for conditional export below
          _OPT_PUBSUB_TOPIC: ${{ secrets.PUBSUB2FIRESTORE_PUBSUB_TOPIC }}
          _OPT_SUBSCRIPTION_FILTER: ${{ secrets.PUBSUB2FIRESTORE_SUBSCRIPTION_FILTER }}
          _OPT_TTL_DAYS: ${{ secrets.PUBSUB2FIRESTORE_TTL_DAYS }}
          _OPT_LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          _OPT_MQTT_EVENT_TYPES: ${{ secrets.MQTT_EVENT_TYPES }}
        run: |
          [[ -n "${_OPT_PUBSUB_TOPIC}" ]]        && export TF_VAR_pubsub_topic="${_OPT_PUBSUB_TOPIC}"
          [[ -n "${_OPT_SUBSCRIPTION_FILTER}" ]] && export TF_VAR_subscription_filter="${_OPT_SUBSCRIPTION_FILTER}"
          [[ -n "${_OPT_TTL_DAYS}" ]]            && export TF_VAR_ttl_days="${_OPT_TTL_DAYS}"
          [[ -n "${_OPT_LOG_LEVEL}" ]]           && export TF_VAR_log_level="${_OPT_LOG_LEVEL}"
          [[ -n "${_OPT_MQTT_EVENT_TYPES}" ]]    && export TF_VAR_mqtt_event_types="${_OPT_MQTT_EVENT_TYPES}"
          terraform apply -auto-approve
