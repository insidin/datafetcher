name: deploy-lakehouse

on:
  push:
    branches: ["main"]
    paths:
      - "lakehouse/**"
      - ".github/workflows/deploy-lakehouse.yml"
  workflow_dispatch:
  workflow_call: # allows release-lakehouse.yml to chain into this

permissions:
  contents: read
  id-token: write

env:
  TF_DIR: lakehouse/terraform
  REGION: europe-west1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── GCP authentication ──────────────────────────────────────────────────

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.LAKEHOUSE_GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── Pre-flight checks ───────────────────────────────────────────────────
      # Validate GCP prerequisites before attempting terraform apply.

      - name: Pre-flight checks
        run: |
          FAILED=0

          echo "==> Checking lakehouse GCS bucket exists..."
          BUCKET="${PROJECT_ID}-lakehouse"
          if gcloud storage buckets describe "gs://${BUCKET}" --project="${PROJECT_ID}" &>/dev/null; then
            echo "  [OK] ${BUCKET}"
          else
            echo "  [FAIL] Bucket '${BUCKET}' not found." >&2
            echo "         Apply platform terraform (data-platform-gcp) first." >&2
            FAILED=1
          fi

          echo "==> Checking Pub/Sub topic exists..."
          TOPIC="${{ secrets.LAKEHOUSE_PUBSUB_TOPIC }}"
          TOPIC="${TOPIC:-mqtt-ingest}"
          if gcloud pubsub topics describe "${TOPIC}" --project="${PROJECT_ID}" &>/dev/null; then
            echo "  [OK] ${TOPIC}"
          else
            echo "  [FAIL] Pub/Sub topic '${TOPIC}' not found." >&2
            echo "         Deploy mqtt2pubsub first, or set LAKEHOUSE_PUBSUB_TOPIC secret." >&2
            FAILED=1
          fi

          [[ ${FAILED} -eq 0 ]] || exit 1

      # ── Terraform ───────────────────────────────────────────────────────────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${PROJECT_ID}-tfstate" \
            -backend-config="prefix=lakehouse"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Remove deprecated resources from Terraform state
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
        run: |
          # One-time migration: old hardcoded table/subscription resources were replaced by for_each.
          # Remove them from state so Terraform stops trying to destroy them (deletion_protection blocks it).
          # The GCP resources are preserved as orphaned historical tables.
          for resource in \
            'google_bigquery_table.shelly_temperature' \
            'google_bigquery_table.shelly_humidity' \
            'google_bigquery_table.shelly_battery' \
            'google_bigquery_table.shelly_switch' \
            'google_pubsub_subscription.shelly_temperature_bq' \
            'google_pubsub_subscription.shelly_humidity_bq' \
            'google_pubsub_subscription.shelly_battery_bq' \
            'google_pubsub_subscription.shelly_switch_bq'; do
            terraform state rm "$resource" 2>/dev/null || true
          done

      - name: Recreate event_type tables with corrected schema
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          _OPT_MQTT_EVENT_TYPES: ${{ secrets.MQTT_EVENT_TYPES }}
        run: |
          # One-time schema migration: tables were initially created with wrong column names
          # (_message_id, _publish_time, _attributes) that Pub/Sub does not recognise.
          # Detect by checking for the old _message_id column; if found, remove from state
          # and delete from GCP so terraform apply recreates them with the correct schema.
          # Tables are empty so no data is lost. Safe to re-run: no-op once schema is correct.
          if [[ -z "${_OPT_MQTT_EVENT_TYPES}" ]]; then exit 0; fi
          IFS=',' read -ra EVENT_TYPES <<< "${_OPT_MQTT_EVENT_TYPES}"
          for et in "${EVENT_TYPES[@]}"; do
            et=$(echo "$et" | xargs)
            TABLE="${PROJECT_ID}:mqtt.${et}"
            if bq show --format=json "${TABLE}" 2>/dev/null | grep -q '"_message_id"'; then
              echo "  Old schema detected on ${et} — recreating"
              terraform state rm "google_bigquery_table.event_type[\"${et}\"]" 2>/dev/null || true
              bq rm -f --table "${TABLE}"
            fi
          done

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          # Optional — staged for conditional export below
          _OPT_PUBSUB_TOPIC: ${{ secrets.LAKEHOUSE_PUBSUB_TOPIC }}
          _OPT_MQTT_EVENT_TYPES: ${{ secrets.MQTT_EVENT_TYPES }}
        run: |
          [[ -n "${_OPT_PUBSUB_TOPIC}" ]] && export TF_VAR_pubsub_topic="${_OPT_PUBSUB_TOPIC}"
          # MQTT_EVENT_TYPES is a comma-separated string; convert to Terraform list syntax.
          if [[ -n "${_OPT_MQTT_EVENT_TYPES}" ]]; then
            TF_LIST=$(echo "${_OPT_MQTT_EVENT_TYPES}" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | sed 's/.*/"&"/' | paste -sd ',' -)
            export TF_VAR_mqtt_event_types="[${TF_LIST}]"
          fi
          terraform apply -auto-approve
